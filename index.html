<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digi Iguá - 2ª Via</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #007a33, #00a84d);
            padding: 30px 20px;
            text-align: center;
            color: white;
        }

        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 15px;
            /* Substitua pelo logo real se tiver */
            background: white;
            border-radius: 50%;
            padding: 8px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px 25px;
            text-align: center;
        }

        .content h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 15px;
        }

        .content p {
            color: #555;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #25D366;
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            padding: 16px 30px;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
        }

        .whatsapp-btn:hover {
            background: #1da851;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5);
        }

        .whatsapp-btn svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .footer {
            background: #f0f0f0;
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #777;
            border-top: 1px solid #e0e0e0;
        }

        .footer a {
            color: #007a33;
            text-decoration: none;
        }
        
        /* Responsivo */
        @media (max-width: 400px) {
            .whatsapp-btn {
                font-size: 16px;
                padding: 14px 24px;
            }
            .content h2 {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <!-- Use um placeholder com as iniciais ou a logomarca -->

                 alt="Logo Iguá" class="logo">

        <div class="content">

        </div>

        </div>
    </div>
</body>
</html>
