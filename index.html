<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Gtex Fibra Óptica - Provedor de internet de alta velocidade em São Luís, Maranhão. Conexão estável, rápida e com suporte dedicado." />
  <meta name="keywords" content="fibra óptica, internet, São Luís, Maranhão, provedor, banda larga, Gtex" />
  <meta name="author" content="Gtex Fibra Óptica LTDA" />
  <meta property="og:title" content="Gtex Fibra Óptica - Internet de Alta Velocidade" />
  <meta property="og:description" content="Provedor de internet fibra óptica em São Luís, MA. Planos residenciais e empresariais." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.gtexfibraoptica.com.br" />
  <title>Gtex Fibra Óptica | Internet de Alta Velocidade em São Luís - MA</title>
  <link rel="canonical" href="https://www.gtexfibraoptica.com.br" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #0066FF;
      --primary-dark: #0047CC;
      --primary-light: #3385FF;
      --secondary: #00C2FF;
      --accent: #FF6B00;
      --dark: #0A0E1A;
      --dark2: #111827;
      --dark3: #1F2937;
      --gray: #6B7280;
      --gray-light: #F3F4F6;
      --white: #FFFFFF;
      --text: #1F2937;
      --text-light: #6B7280;
      --border: #E5E7EB;
      --shadow: 0 4px 24px rgba(0,102,255,0.10);
      --shadow-lg: 0 8px 48px rgba(0,102,255,0.18);
      --radius: 12px;
      --radius-lg: 20px;
      --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: var(--white);
      overflow-x: hidden;
      line-height: 1.6;
    }
    img { max-width: 100%; display: block; }
    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    .section { padding: 90px 0; }
    .section-alt { background: var(--gray-light); }
    .section-dark { background: var(--dark2); color: var(--white); }
    .section-title {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 800;
      margin-bottom: 16px;
      line-height: 1.2;
    }
    .section-subtitle {
      font-size: 1.05rem;
      color: var(--text-light);
      max-width: 560px;
      margin: 0 auto 56px;
    }
    .text-center { text-align: center; }
    .badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: var(--white);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 16px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: var(--transition);
      text-decoration: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white);
      box-shadow: 0 4px 20px rgba(0,102,255,0.35);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,102,255,0.45);
    }
    .btn-outline {
      background: transparent;
      color: var(--white);
      border: 2px solid rgba(255,255,255,0.5);
    }
    .btn-outline:hover {
      background: rgba(255,255,255,0.1);
      border-color: var(--white);
    }
    .btn-accent {
      background: linear-gradient(135deg, var(--accent), #FF8C00);
      color: var(--white);
      box-shadow: 0 4px 20px rgba(255,107,0,0.35);
    }
    .btn-accent:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(255,107,0,0.45);
    }

    /* ===== HEADER / NAV ===== */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      transition: var(--transition);
      padding: 16px 0;
    }
    #header.scrolled {
      background: rgba(10,14,26,0.97);
      backdrop-filter: blur(20px);
      padding: 10px 0;
      box-shadow: 0 2px 30px rgba(0,0,0,0.3);
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--white);
      font-weight: 800;
      font-size: 1.4rem;
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: white;
      flex-shrink: 0;
    }
    .logo span { color: var(--secondary); }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-links a {
      color: rgba(255,255,255,0.85);
      font-size: 0.9rem;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 8px;
      transition: var(--transition);
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--white);
      background: rgba(255,255,255,0.1);
    }
    .nav-cta {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: var(--white) !important;
      padding: 10px 22px !important;
      border-radius: 50px !important;
      font-weight: 600 !important;
    }
    .nav-cta:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary)) !important;
      transform: translateY(-1px);
    }
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 8px;
      background: none;
      border: none;
    }
    .hamburger span {
      display: block;
      width: 24px; height: 2px;
      background: var(--white);
      border-radius: 2px;
      transition: var(--transition);
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-menu {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10,14,26,0.98);
      z-index: 999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      color: var(--white);
      font-size: 1.4rem;
      font-weight: 600;
      padding: 12px 32px;
      border-radius: 12px;
      transition: var(--transition);
    }
    .mobile-menu a:hover { background: rgba(255,255,255,0.1); color: var(--secondary); }
    .mobile-close {
      position: absolute;
      top: 20px; right: 20px;
      background: none;
      border: none;
      color: var(--white);
      font-size: 1.8rem;
      cursor: pointer;
    }

    /* ===== HERO ===== */
    #hero {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--dark) 0%, #0A1628 50%, #0D1F3C 100%);
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding-top: 80px;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .hero-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: float 8s ease-in-out infinite;
    }
    .hero-orb-1 {
      width: 600px; height: 600px;
      background: var(--primary);
      top: -200px; right: -100px;
    }
    .hero-orb-2 {
      width: 400px; height: 400px;
      background: var(--secondary);
      bottom: -100px; left: -100px;
      animation-delay: -4s;
    }
    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,102,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,102,255,0.05) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }
    .hero-content {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }
    .hero-text { color: var(--white); }
    .hero-text .badge { margin-bottom: 24px; }
    .hero-title {
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 24px;
    }
    .hero-title .highlight {
      background: linear-gradient(135deg, var(--primary-light), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-desc {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.75);
      margin-bottom: 40px;
      line-height: 1.7;
    }
    .hero-actions { display: flex; gap: 16px; flex-wrap: wrap; }
    .hero-stats {
      display: flex;
      gap: 32px;
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .hero-stat-num {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary-light), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-stat-label {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .hero-visual {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .hero-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: 40px;
      backdrop-filter: blur(20px);
      width: 100%;
      max-width: 420px;
      animation: float 6s ease-in-out infinite;
    }
    .speed-display {
      text-align: center;
      margin-bottom: 32px;
    }
    .speed-circle {
      width: 160px; height: 160px;
      border-radius: 50%;
      background: conic-gradient(var(--primary) 0%, var(--secondary) 75%, rgba(255,255,255,0.1) 75%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      position: relative;
    }
    .speed-circle::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      background: var(--dark2);
    }
    .speed-inner {
      position: relative;
      z-index: 1;
      text-align: center;
    }
    .speed-num {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--white);
      line-height: 1;
    }
    .speed-unit { font-size: 0.75rem; color: var(--secondary); font-weight: 600; }
    .speed-label { color: rgba(255,255,255,0.6); font-size: 0.85rem; }
    .plan-features { display: flex; flex-direction: column; gap: 12px; }
    .plan-feature {
      display: flex;
      align-items: center;
      gap: 12px;
      color: rgba(255,255,255,0.85);
      font-size: 0.9rem;
    }
    .plan-feature i { color: var(--secondary); font-size: 1rem; }

    /* ===== SOBRE ===== */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }
    .about-visual {
      position: relative;
    }
    .about-img-wrap {
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8rem;
      color: rgba(255,255,255,0.3);
    }
    .about-badge-float {
      position: absolute;
      bottom: -20px; right: -20px;
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .about-badge-float .num {
      font-size: 2rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }
    .about-badge-float .lbl {
      font-size: 0.75rem;
      color: var(--text-light);
      margin-top: 4px;
    }
    .about-text .badge { margin-bottom: 16px; }
    .about-text .section-title { text-align: left; }
    .about-text p {
      color: var(--text-light);
      margin-bottom: 20px;
      line-height: 1.8;
    }
    .about-list { margin: 24px 0 32px; display: flex; flex-direction: column; gap: 12px; }
    .about-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
    }
    .about-list li i { color: var(--primary); font-size: 1.1rem; }

    /* ===== SERVIÇOS ===== */
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }
    .service-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .service-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      transform: scaleX(0);
      transition: var(--transition);
    }
    .service-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-lg);
      border-color: transparent;
    }
    .service-card:hover::before { transform: scaleX(1); }
    .service-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, rgba(0,102,255,0.1), rgba(0,194,255,0.1));
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: var(--primary);
      margin-bottom: 24px;
    }
    .service-card h3 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .service-card p {
      color: var(--text-light);
      font-size: 0.95rem;
      line-height: 1.7;
    }

    /* ===== PLANOS / PRODUTOS ===== */
    #produtos { background: linear-gradient(135deg, var(--dark) 0%, #0A1628 100%); }
    .plans-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
      align-items: start;
    }
    .plan-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      color: var(--white);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }
    .plan-card.featured {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-color: var(--primary-light);
      transform: scale(1.05);
      box-shadow: 0 20px 60px rgba(0,102,255,0.4);
    }
    .plan-card:hover:not(.featured) {
      transform: translateY(-8px);
      border-color: rgba(0,102,255,0.4);
      box-shadow: 0 20px 60px rgba(0,102,255,0.2);
    }
    .plan-badge {
      position: absolute;
      top: 20px; right: 20px;
      background: var(--accent);
      color: white;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .plan-name {
      font-size: 1rem;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .plan-speed {
      font-size: 3.5rem;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 4px;
    }
    .plan-speed span { font-size: 1.2rem; font-weight: 500; }
    .plan-price-label { color: rgba(255,255,255,0.6); font-size: 0.85rem; margin-bottom: 28px; }
    .plan-price {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .plan-price small { font-size: 1rem; font-weight: 400; }
    .plan-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.15);
      margin: 24px 0;
    }
    .plan-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
    .plan-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.85);
    }
    .plan-list li i { color: var(--secondary); font-size: 0.85rem; }
    .plan-card .btn { width: 100%; justify-content: center; }

    /* ===== GALERIA ===== */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: auto;
      gap: 16px;
    }
    .gallery-item {
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      cursor: pointer;
      aspect-ratio: 4/3;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: rgba(255,255,255,0.4);
      transition: var(--transition);
    }
    .gallery-item:nth-child(1) { grid-column: span 2; aspect-ratio: 16/9; }
    .gallery-item:nth-child(4) { grid-column: span 2; aspect-ratio: 16/9; }
    .gallery-item:hover { transform: scale(1.02); }
    .gallery-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
      opacity: 0;
      transition: var(--transition);
      display: flex;
      align-items: flex-end;
      padding: 20px;
    }
    .gallery-item:hover .gallery-overlay { opacity: 1; }
    .gallery-overlay span {
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .gallery-colors {
      --c1: #0066FF; --c2: #00C2FF; --c3: #0047CC;
      --c4: #3385FF; --c5: #0A1628; --c6: #FF6B00;
    }
    .gallery-item:nth-child(1) { background: linear-gradient(135deg, #0066FF, #00C2FF); }
    .gallery-item:nth-child(2) { background: linear-gradient(135deg, #0047CC, #3385FF); }
    .gallery-item:nth-child(3) { background: linear-gradient(135deg, #00C2FF, #0066FF); }
    .gallery-item:nth-child(4) { background: linear-gradient(135deg, #0A1628, #0066FF); }
    .gallery-item:nth-child(5) { background: linear-gradient(135deg, #3385FF, #00C2FF); }
    .gallery-item:nth-child(6) { background: linear-gradient(135deg, #FF6B00, #FF8C00); }

    /* ===== DEPOIMENTOS ===== */
    .testimonials-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 28px;
    }
    .testimonial-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px;
      transition: var(--transition);
    }
    .testimonial-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }
    .stars { color: #FBBF24; font-size: 1rem; margin-bottom: 16px; }
    .testimonial-text {
      color: var(--text-light);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 24px;
      font-style: italic;
    }
    .testimonial-author {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .author-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .author-name { font-weight: 700; font-size: 0.95rem; }
    .author-role { font-size: 0.8rem; color: var(--text-light); }

    /* ===== CONTATO ===== */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 60px;
      align-items: start;
    }
    .contact-info h3 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .contact-info p {
      color: var(--text-light);
      margin-bottom: 32px;
      line-height: 1.7;
    }
    .contact-items { display: flex; flex-direction: column; gap: 20px; }
    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }
    .contact-item-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, rgba(0,102,255,0.1), rgba(0,194,255,0.1));
      border-radius: var(--radius);
      display: flex;
      align-items: center;
